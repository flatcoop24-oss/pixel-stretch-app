<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#09090b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pixel Stretch">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="stylesheet" href="./style.css">
  <title>Pixel Stretch Studio</title>
</head>
<body>
<main class="app">
  <header class="topbar">
    <div><p class="eyebrow">PRIVATE IMAGE LAB</p><h1>Pixel Stretch</h1></div>
    <div class="top-actions">
      <button id="helpBtn" class="round" aria-label="도움말">?</button>
      <label class="round" aria-label="사진 불러오기">＋<input id="fileInput" type="file" accept="image/*" hidden></label>
    </div>
  </header>
  <section id="workspace" class="workspace">
    <div id="emptyState" class="empty">
      <div class="mark">↗</div><h2>사진을 선택하세요</h2>
      <p>이미지는 서버로 전송되지 않고 이 기기에서만 처리됩니다.</p>
      <label class="button primary">사진 불러오기<input id="firstInput" type="file" accept="image/*" hidden></label>
    </div>
    <div id="viewport" class="viewport hidden">
      <div id="stage" class="stage"><canvas id="canvas"></canvas></div>
      <div id="brushCursor" class="brush-cursor hidden"></div>
      <div class="zoom-chip"><span id="zoomText">100%</span><button id="fitBtn">맞춤</button></div>
    </div>
  </section>
  <section id="panel" class="panel hidden">
    <nav class="tools">
      <button class="tool active" data-tool="line"><span>／</span>라인</button>
      <button class="tool" data-tool="brush"><span>✦</span>브러시</button>
      <button class="tool" data-tool="hand"><span>✋</span>이동</button>
    </nav>
    <div class="presets"><button data-angle="0" class="active">0°</button><button data-angle="45">45°</button><button data-angle="90">90°</button><button data-angle="135">135°</button></div>
    <div class="slider"><div><span>각도</span><output id="angleOut">0°</output></div><input id="angle" type="range" min="0" max="359" value="0"></div>
    <div class="slider"><div><span>길이</span><output id="lengthOut">320</output></div><input id="length" type="range" min="20" max="1600" step="10" value="320"></div>
    <div class="slider"><div><span>두께</span><output id="sizeOut">32</output></div><input id="size" type="range" min="2" max="300" step="2" value="32"></div>
    <div class="slider"><div><span>불투명도</span><output id="opacityOut">100%</output></div><input id="opacity" type="range" min="5" max="100" step="5" value="100"></div>
    <div class="slider"><div><span>간격</span><output id="spacingOut">35%</output></div><input id="spacing" type="range" min="10" max="100" step="5" value="35"></div>
    <div class="actions"><button id="undoBtn" disabled>↶ 실행 취소</button><button id="redoBtn" disabled>↷ 다시 실행</button><button id="resetBtn">원본 복원</button><button id="saveBtn" class="primary">저장 / 공유</button></div>
  </section>
</main>
<div id="toast" class="toast"></div>
<dialog id="helpDialog"><article><header><h2>사용 방법</h2><button id="closeHelp" class="round">×</button></header><p><b>라인</b>은 사진을 누른 지점의 픽셀을 설정한 각도로 길게 늘립니다.</p><p><b>브러시</b>는 손가락 경로를 따라 효과를 연속 적용합니다.</p><p><b>이동</b>은 화면을 드래그합니다. 어느 도구에서든 두 손가락으로 확대·축소할 수 있습니다.</p><p>편집 내용은 브라우저에 자동 임시 저장됩니다. 저장 버튼은 작업 해상도의 PNG를 만듭니다.</p></article></dialog>
<script src="./app.js"></script>
</body></html>
