<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#09090b"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="Pixel Stretch"><link rel="manifest" href="./manifest.webmanifest"><link rel="apple-touch-icon" href="./icon.svg"><link rel="stylesheet" href="./style.css"><title>Pixel Stretch Studio</title></head><body><main class="app"><header class="topbar"><div><p class="eyebrow">SCANLINE IMAGE TOOL</p><h1>Pixel Stretch</h1></div><div class="top-actions"><button id="helpBtn" class="round">?</button><label class="round">＋<input id="fileInput" type="file" accept="image/*" hidden></label></div></header><section class="workspace"><div id="emptyState" class="empty"><div class="mark">⇥</div><h2>사진을 선택하세요</h2><p>세로 단면의 픽셀을 좌우로 길게 늘려 스캔라인 효과를 만듭니다.</p><label class="button primary">사진 불러오기<input id="firstInput" type="file" accept="image/*" hidden></label></div><div id="viewport" class="viewport hidden"><div id="stage" class="stage"><canvas id="canvas"></canvas></div><div id="brushCursor" class="brush-cursor hidden"></div><div class="zoom-chip"><span id="zoomText">100%</span><button id="fitBtn">맞춤</button></div></div></section><section id="panel" class="panel hidden"><nav class="tools"><button class="tool active" data-tool="scanx"><span>⇥</span>가로 스캔</button><button class="tool" data-tool="scany"><span>⇣</span>세로 스캔</button><button class="tool" data-tool="hand"><span>✋</span>이동</button></nav><div class="slider"><div><span>단면 폭</span><output id="sliceOut">2px</output></div><input id="slice" type="range" min="1" max="24" value="2"></div><div class="slider"><div><span>불투명도</span><output id="opacityOut">100%</output></div><input id="opacity" type="range" min="10" max="100" step="5" value="100"></div><div class="slider"><div><span>경계 블렌드</span><output id="blendOut">0%</output></div><input id="blend" type="range" min="0" max="60" step="5" value="0"></div><div class="actions"><button id="undoBtn" disabled>↶ 실행 취소</button><button id="redoBtn" disabled>↷ 다시 실행</button><button id="resetBtn">원본 복원</button><button id="saveBtn" class="primary">저장 / 공유</button></div></section></main><div id="toast" class="toast"></div><dialog id="helpDialog"><article><header><h2>사용 방법</h2><button id="closeHelp" class="round">×</button></header><p><b>가로 스캔</b>: 늘리고 싶은 지점을 누른 뒤 좌우로 드래그합니다. 시작점의 세로 픽셀 단면이 드래그한 길이만큼 늘어납니다.</p><p><b>세로 스캔</b>: 시작점의 가로 픽셀 단면을 위아래로 늘립니다.</p><p>예시처럼 만들려면 밝은 건물이나 인물의 가장자리에서 시작해 빈 배경 방향으로 드래그하세요.</p></article></dialog><script src="./app.js"></script></body></html>
